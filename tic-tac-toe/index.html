<!DOCTYPE html>
<html>
<head>
	
	<!-- meta tags and title -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tic-Tac-Toe</title>

	<!-- external CSS -->
	<link rel="stylesheet" href="styles.css" media="all">

    <!-- external JavaScript -->
	<script src="scripts.js" defer></script>
	
</head>
<body>

    <div id="currentPlayer">
        Current Player: <span></span>
    </div>
    
    <div id="gameResult">
        (no winner yet)
    </div>

	<!-- HTML elements here -->
     <div id="gameBoard">
        <div class="gameSpace" id="a1"></div> <!--top 3-->
        <div class="gameSpace" id="a2"></div>
        <div class="gameSpace" id="a3"></div>
        <div class="gameSpace" id="b1"></div><!--middle 3-->
        <div class="gameSpace" id="b2">o</div>
        <div class="gameSpace" id="b3">o</div>
        <div class="gameSpace" id="c1">x</div><!--bottom 3-->
        <div class="gameSpace" id="c2"></div>
        <div class="gameSpace" id="c3"></div>
     </div>

</body>
</html>
